<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Social Network</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
</head>

<body>

<h1>My Social Media Network</h1>

<div class="search-container">

    <div class="search-box">

        <input 
            id="searchName" 
            placeholder="Search name"
            oninput="showClearSearch()"
        >

        <button 
            id="clearSearch"
            onclick="clearSearchText()">
            ✕
        </button>

    </div>

    <button onclick="searchPerson()">Search</button>

</div>

<div class="controls">
    <input id="person1" placeholder="Person 1">
    <input id="person2" placeholder="Person 2">

    <select id="platform">
        <option>Facebook</option>
        <option>Instagram</option>
        <option>TikTok</option>
        <option>X</option>
    </select>

    <button onclick="addConnection()">Add Connection</button>
    <button class="save" onclick="saveData()">Save</button>

    <input id="graphName" placeholder="New social name">
    <button onclick="createGraph()">Create Graph</button>

    <select id="graphList" onchange="switchGraph()"></select>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div id="sideMenu" class="side-menu">
        <button class="close-btn" onclick="closeMenu()">✕</button>
        <h3>Menu</h3>
    <div class="folder social-main" onclick="toggleSocialFolder()">
        <span>
        📁 Socials
        </span>
        <span id="folderArrow">
        ▶
        </span>
    </div>

        <div id="socialFolder" class="sub-folder"></div>
    </div>
</div>

<div class="main">
    <div id="cy"></div>

    <div id="details">
        Click a person to view connections.
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
